name: DevSecOps & Multi-Silicon Engine Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 3 * * 1' # Weekly Monday at 3:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: 🛡️ 1. Secret & Credential Audit (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-analysis:
    name: 🔍 2. SAST Analysis (CodeQL & Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize GitHub CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      - name: Run Semgrep OSS SAST Scanner
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif . || true
          if [ ! -s semgrep.sarif ]; then
            echo '{"$schema": "https://json.schemastore.org/sarif-2.1.0.json", "version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Semgrep"}}, "results": []}]}' > semgrep.sarif
          fi

      - name: Upload Semgrep SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: 📦 3. SCA Dependency Scan (Pip-Audit & Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run PyPA Pip-Audit Vulnerability Check
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e .
          pip-audit || true

      - name: Run Trivy Filesystem Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Ensure Trivy SARIF exists
        if: always()
        run: |
          if [ ! -s trivy-results.sarif ]; then
            echo '{"$schema": "https://json.schemastore.org/sarif-2.1.0.json", "version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Trivy"}}, "results": []}]}' > trivy-results.sarif
          fi

      - name: Upload Trivy SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  iac-and-container-check:
    name: 🏗️ 4. IaC & Container Hardening (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Checkov Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          framework: dockerfile,github_actions,yaml
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true

      - name: Ensure Checkov SARIF exists
        if: always()
        run: |
          if [ ! -s checkov.sarif ]; then
            echo '{"$schema": "https://json.schemastore.org/sarif-2.1.0.json", "version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Checkov"}}, "results": []}]}' > checkov.sarif
          fi

      - name: Upload Checkov SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif

  unit-tests-and-benchmarks:
    name: ✅ 5. Code Quality & Numerical Engine Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install pytest ruff

      - name: Verify Security & Syntax with Ruff
        run: ruff check . --select E,F,S,I,UP,B,C90

      - name: Run Unit & Numerical Benchmark Verification Suite
        run: pytest -v
